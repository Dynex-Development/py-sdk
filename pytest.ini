[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Fast unit tests without external dependencies
    integration: Integration tests that require API access and credentials
    slow: Tests that take more than 30 seconds

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

addopts =
    --strict-markers
    --tb=short
    -v

filterwarnings =
    ignore::SyntaxWarning:pyqubo
    ignore::DeprecationWarning:pennylane
    ignore::DeprecationWarning:pkg_resources
