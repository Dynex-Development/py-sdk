name: Tests

on:
  pull_request:
    branches: [master, main, feat/*]
  push:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-style:
    name: Code Style Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install formatters
        run: pip install black isort

      - name: Check formatting
        run: black --check --diff .

      - name: Check import order
        run: isort --check-only --diff .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-style

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov python-dotenv

      - name: Run unit tests
        env:
          DYNEX_SDK_KEY: ${{ secrets.DYNEX_SDK_KEY }}
        run: |
          source .venv/bin/activate
          pytest tests/unit/ -v --cov=dynex --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout pytest-asyncio python-dotenv scipy matplotlib

      - name: Check if secrets are available
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DYNEX_SDK_KEY }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "Secrets not available (PR from fork?)"
          else
            echo "secrets_available=true" >> $GITHUB_OUTPUT
            echo "Secrets available"
          fi

      - name: Run integration tests
        if: steps.check_secrets.outputs.secrets_available == 'true'
        env:
          DYNEX_SDK_KEY: ${{ secrets.DYNEX_SDK_KEY }}
          DYNEX_GRPC_ENDPOINT: ${{ secrets.DYNEX_GRPC_ENDPOINT }}
          RUN_INTEGRATION_TESTS: true
          CI: true
        run: |
          source .venv/bin/activate
          pytest tests/integration/ -v -m "not slow" --timeout=300 --tb=short

      - name: Skip integration tests
        if: steps.check_secrets.outputs.secrets_available == 'false'
        run: |
          echo "Integration tests skipped — secrets not available for fork PRs"
          echo "Maintainers will run integration tests after merge"
